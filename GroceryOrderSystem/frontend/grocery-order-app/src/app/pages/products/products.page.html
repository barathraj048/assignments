<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Products</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="loading" style="text-align: center; margin-top: 50px;">
    <ion-spinner></ion-spinner>
    <p>Loading products...</p>
  </div>

  <div *ngIf="errorMessage" style="color: red; text-align: center; margin-top: 50px;">
    {{ errorMessage }}
  </div>

  <ion-list *ngIf="!loading && !errorMessage">
    <ion-item *ngFor="let p of products">
      <ion-label>
        <h2>{{ p.name }}</h2>
        <p>Price: ₹{{ p.price }}</p>
        <p>Stock: {{ p.stock }}</p>
      </ion-label>
      <ion-button 
        color="success" 
        (click)="openOrder(p.id)"
        [disabled]="p.stock === 0">
        {{ p.stock > 0 ? 'Order' : 'Out of Stock' }}
      </ion-button>
    </ion-item>
  </ion-list>

</ion-content>
